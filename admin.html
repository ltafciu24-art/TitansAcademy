<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Titan Admin Panel</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <main class="container py-4 py-md-5">
    <header class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
      <div>
        <h1 class="mb-1">Titan Admin</h1>
        <p class="text-secondary mb-0">Manage site data and review applications saved in localStorage.</p>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-warning" id="admin-logout" type="button">Logout</button>
        <a class="btn btn-outline-light" href="index.html">Back To Site</a>
      </div>
    </header>

    <section class="admin-section mb-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h5 mb-0">Players</h2>
        <button class="btn btn-sm btn-warning" id="reset-players" type="button">Reset Players</button>
      </div>
      <form id="players-form" class="row g-2 g-md-3">
        <input type="hidden" id="player-index" />
        <div class="col-md-4"><input class="form-control" id="player-name" placeholder="Name" required /></div>
        <div class="col-md-2">
          <select class="form-select" id="player-pos" required>
            <option value="">Position</option>
            <option value="GK">GK</option>
            <option value="DEF">DEF</option>
            <option value="MID">MID</option>
            <option value="FWD">FWD</option>
          </select>
        </div>
        <div class="col-md-2"><input class="form-control" id="player-emoji" placeholder="Emoji" required /></div>
        <div class="col-md-1"><input class="form-control" id="player-num" type="number" min="0" placeholder="#" required /></div>
        <div class="col-md-1"><input class="form-control" id="player-goals" type="number" min="0" placeholder="G" required /></div>
        <div class="col-md-1"><input class="form-control" id="player-assists" type="number" min="0" placeholder="A" required /></div>
        <div class="col-md-1"><input class="form-control" id="player-apps" type="number" min="0" placeholder="Apps" required /></div>
        <div class="col-12 d-flex gap-2">
          <button class="btn btn-success" type="submit">Save Player</button>
          <button class="btn btn-secondary" id="cancel-player" type="button">Cancel</button>
        </div>
      </form>
      <div class="table-responsive mt-3">
        <table class="table table-dark table-striped align-middle mb-0" id="players-table">
          <thead>
            <tr><th>Name</th><th>Pos</th><th>#</th><th>Goals</th><th>Assists</th><th>Apps</th><th>Actions</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="admin-section mb-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h5 mb-0">Coaches</h2>
        <button class="btn btn-sm btn-warning" id="reset-coaches" type="button">Reset Coaches</button>
      </div>
      <form id="coaches-form" class="row g-2 g-md-3">
        <input type="hidden" id="coach-index" />
        <div class="col-md-3"><input class="form-control" id="coach-name" placeholder="Name" required /></div>
        <div class="col-md-3"><input class="form-control" id="coach-role" placeholder="Role" required /></div>
        <div class="col-md-2"><input class="form-control" id="coach-emoji" placeholder="Emoji" required /></div>
        <div class="col-md-4"><input class="form-control" id="coach-bio" placeholder="Short bio" required /></div>
        <div class="col-12 d-flex gap-2">
          <button class="btn btn-success" type="submit">Save Coach</button>
          <button class="btn btn-secondary" id="cancel-coach" type="button">Cancel</button>
        </div>
      </form>
      <div class="table-responsive mt-3">
        <table class="table table-dark table-striped align-middle mb-0" id="coaches-table">
          <thead>
            <tr><th>Name</th><th>Role</th><th>Bio</th><th>Actions</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="admin-section mb-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h5 mb-0">Schedule</h2>
        <button class="btn btn-sm btn-warning" id="reset-schedule" type="button">Reset Schedule</button>
      </div>
      <form id="schedule-form" class="row g-2 g-md-3">
        <input type="hidden" id="schedule-index" />
        <div class="col-md-1"><input class="form-control" id="schedule-day" placeholder="Day" required /></div>
        <div class="col-md-2"><input class="form-control" id="schedule-month" placeholder="Month" required /></div>
        <div class="col-md-3"><input class="form-control" id="schedule-title" placeholder="Title" required /></div>
        <div class="col-md-4"><input class="form-control" id="schedule-detail" placeholder="Detail" required /></div>
        <div class="col-md-2">
          <select class="form-select" id="schedule-type" required>
            <option value="">Type</option>
            <option value="training">Training</option>
            <option value="match">Match</option>
            <option value="trial">Trial</option>
          </select>
        </div>
        <div class="col-12 d-flex gap-2">
          <button class="btn btn-success" type="submit">Save Event</button>
          <button class="btn btn-secondary" id="cancel-schedule" type="button">Cancel</button>
        </div>
      </form>
      <div class="table-responsive mt-3">
        <table class="table table-dark table-striped align-middle mb-0" id="schedule-table">
          <thead>
            <tr><th>Date</th><th>Title</th><th>Detail</th><th>Type</th><th>Actions</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="admin-section mb-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h5 mb-0">Applications</h2>
        <button class="btn btn-sm btn-danger" id="clear-applications" type="button">Clear Applications</button>
      </div>
      <div class="table-responsive">
        <table class="table table-dark table-striped align-middle mb-0" id="applications-table">
          <thead>
            <tr><th>Name</th><th>Email</th><th>Program</th><th>Status</th><th>Submitted</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <p class="small text-secondary mt-2 mb-0" id="pending-summary"></p>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
